name: Sync team members

on:
  workflow_dispatch:
    inputs:
      reviewers:
        description: 'Comma-separated reviewers (users, or org/team-slug for teams)'
        required: false
        default: 'mui/admins'
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'

permissions: {}

jobs:
  sync:
    if: github.repository == 'mui/material-ui'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: Use Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: '22.23.1'
          cache: 'pnpm' # https://github.com/actions/setup-node/blob/main/docs/advanced-usage.md#caching-packages-dependencies
      - run: pnpm install
      - name: Sync team members
        id: sync
        run: |
          {
            echo 'summary<<SYNC_SUMMARY_EOF'
            pnpm --silent exec tsx ./docs/scripts/syncTeamMembers.ts
            echo 'SYNC_SUMMARY_EOF'
          } >> "$GITHUB_OUTPUT"
          pnpm prettier
      - name: Create or update pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SYNC_SUMMARY: ${{ steps.sync.outputs.summary }}
          # Empty on scheduled runs, so fall back to the default reviewers.
          REVIEWERS: ${{ inputs.reviewers || 'mui/admins' }}
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain)" ]; then
            echo 'No team member changes. Skipping PR.'
            exit 0
          fi

          BRANCH=website/sync-team-members
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git switch -C "$BRANCH"
          git commit --all --message '[website] Sync about page team members'
          git push --force origin "$BRANCH"

          BODY="$(printf 'Automated sync of the About page team members from the [mui-about API](https://frontend-public.mui.com/api/mui-about).\n\n%s' "$SYNC_SUMMARY")"

          if [ -n "$(gh pr list --head "$BRANCH" --state open --json number --jq '.[].number')" ]; then
            gh pr edit "$BRANCH" --body "$BODY"
          else
            gh pr create \
              --base master \
              --head "$BRANCH" \
              --title '[website] Sync about page team members' \
              --body "$BODY" \
              --label website \
              --reviewer "$REVIEWERS"
          fi
