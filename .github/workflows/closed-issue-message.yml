name: Add closing message to issue

on:
  issues:
    types:
      - closed

permissions: {}

jobs:
  add-comment:
    name: Add closing message
    if: github.event.issue.state_reason == 'completed'
    uses: mui/mui-public/.github/workflows/issues_add-closing-message.yml@8db9f6d4d2d14e834e3f8fda91d902a583fbf55b
    permissions:
      contents: read
      issues: write
