name: Add closing message to issue

on:
  issues:
    types:
      - closed

permissions: {}

jobs:
  add-comment:
    name: Add closing message
    if: github.event.issue.state_reason == 'completed'
    uses: mui/mui-public/.github/workflows/issues_add-closing-message.yml@2cf5fd6323dcc09a25dd287dca00cb5edb5bdd14 # master
    permissions:
      contents: read
      issues: write
