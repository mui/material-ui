name: Add closing message to issue

on:
  issues:
    types:
      - closed

permissions: {}

jobs:
  add-comment:
    name: Add closing message
    if: github.event.issue.state_reason == 'completed'
    uses: mui/mui-public/.github/workflows/issues_add-closing-message.yml@36e5bc715e1f846f6dec9b94be0bc6234ea8ed35
    permissions:
      contents: read
      issues: write
